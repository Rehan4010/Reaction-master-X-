<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚡ Reaction Master X</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    width:90%;
    max-width:550px;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    box-shadow:0 0 30px rgba(0,0,0,0.4);
    text-align:center;
}

h1{
    font-size:42px;
    margin-bottom:10px;
}

.subtitle{
    opacity:0.8;
    margin-bottom:20px;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:20px;
}

.card{
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
}

.card h2{
    font-size:16px;
    margin-bottom:10px;
}

.card span{
    font-size:24px;
    font-weight:bold;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:12px;
    background:#00c6ff;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    margin:5px;
}

button:hover{
    transform:scale(1.05);
    background:#0072ff;
}

#gameBox{
    width:120px;
    height:120px;
    border-radius:25px;
    position:absolute;
    display:none;
    cursor:pointer;
    animation:pop 0.2s ease;
    box-shadow:0 0 25px rgba(255,255,255,0.4);
}

@keyframes pop{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }
}

.footer{
    margin-top:20px;
    opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

    <h1>⚡ Reaction Master X</h1>

    <div class="subtitle">
        Click as fast as possible and dominate the leaderboard!
    </div>

    <div class="stats">

        <div class="card">
            <h2>Reaction</h2>
            <span id="reaction">-- ms</span>
        </div>

        <div class="card">
            <h2>Best</h2>
            <span id="best">-- ms</span>
        </div>

        <div class="card">
            <h2>Level</h2>
            <span id="level">1</span>
        </div>

        <div class="card">
            <h2>Streak</h2>
            <span id="streak">0</span>
        </div>

    </div>

    <button onclick="startGame()">🚀 Start</button>
    <button onclick="pauseGame()">⏸ Pause</button>

    <div class="footer">
        Built by a future legend dev 😎🔥
    </div>

</div>

<div id="gameBox"></div>

<audio id="clickSound">
<source src="https://www.soundjay.com/buttons/sounds/button-09.mp3">
</audio>

<script>

let startTime;
let level = 1;
let streak = 0;
let paused = false;

let best = localStorage.getItem("bestScore");

if(best){
    document.getElementById("best").innerHTML =
    best + " ms";
}

const colors = [
    "#ff4d4d",
    "#00ff99",
    "#00c6ff",
    "#ffcc00",
    "#ff66ff",
    "#ffffff"
];

function random(max){
    return Math.floor(Math.random() * max);
}

function randomColor(){
    return colors[random(colors.length)];
}

function randomPosition(){

    const box = document.getElementById("gameBox");

    const top = random(window.innerHeight - 150);
    const left = random(window.innerWidth - 150);

    box.style.top = top + "px";
    box.style.left = left + "px";
}

function showBox(){

    if(paused) return;

    const box = document.getElementById("gameBox");

    randomPosition();

    box.style.background = randomColor();

    box.style.width = (120 - level * 5) + "px";
    box.style.height = (120 - level * 5) + "px";

    box.style.display = "block";

    startTime = new Date().getTime();
}

function startGame(){

    paused = false;

    document.getElementById("reaction").innerHTML =
    "Wait...";

    const delay = Math.random() * 2000 + 500;

    setTimeout(showBox, delay);
}

function pauseGame(){

    paused = true;

    document.getElementById("gameBox").style.display =
    "none";
}

document.getElementById("gameBox").onclick = function(){

    document.getElementById("clickSound").play();

    if(navigator.vibrate){
        navigator.vibrate(50);
    }

    const end = new Date().getTime();

    const reaction = end - startTime;

    document.getElementById("reaction").innerHTML =
    reaction + " ms";

    if(!best || reaction < best){

        best = reaction;

        localStorage.setItem("bestScore", best);

        document.getElementById("best").innerHTML =
        best + " ms";
    }

    streak++;

    document.getElementById("streak").innerHTML =
    streak;

    if(streak % 3 === 0){
        level++;
        document.getElementById("level").innerHTML =
        level;
    }

    this.style.display = "none";

    startGame();
};

</script>

</body>
</html>
